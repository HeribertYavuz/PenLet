# ============================================================
#  penlet - AREA yapilandirmasi
# ============================================================
# Bu dosya daemon calisirken okunur. Degistirdikten sonra
# daemon'i yeniden baslat (Ctrl+C -> tekrar calistir).
#
# Tum degerler 0.0 - 1.0 arasi NORMALIZE. Telefon ekraninin
# sol-ust kosesi (0,0), sag-alt kosesi (1,1).
#
# MANTIK: Telefonun burada tanimladigin dikdortgen bolgesi,
# ekranin/osu! playfield'inin TAMAMINA yayilir. Yani kucuk
# bir area sec -> kalemi az oynatarak tum ekrani gezersin
# (yuksek hassasiyet, az el hareketi - osu! icin ideal).
# ============================================================

# --- Tablet area (telefon uzerinde kullanilacak dikdortgen) ---
# Ornek varsayilan: tum ekran (kirpma yok)
area_x0 = 0.0
area_y0 = 0.0
area_x1 = 1.0
area_y1 = 1.0

# --- Ornek: kenarlardan kirp, ortadaki bolgeyi kullan ---
# (yukaridakileri silip bunu acabilirsin)
# area_x0 = 0.10
# area_y0 = 0.15
# area_x1 = 0.90
# area_y1 = 0.85

# --- Aspect ratio (en:boy) duzeltmesi ---
# keep_aspect = 1  -> area orani target_aspect'e sabitlenir (osu! playfield ~4:3).
#                     Boylece daireler yamuk/ezik olmaz, aim dogru hisseder.
# keep_aspect = 0  -> area oldugu gibi tum cikisa gerilir (aspect bozulabilir).
keep_aspect = 0

# osu! playfield orani genelde 4:3 = 1.333
# 16:9 tam ekran istiyorsan 1.777 yazabilirsin.
target_aspect = 1.333

# ============================================================
#  IPUCU (osu! icin tipik ayar):
#  - Once tum ekran (0..1) ile dene, hisset.
#  - Cok genis geliyorsa area'yi kucult (orn. 0.15..0.85).
#  - Daireler yamuk geliyorsa keep_aspect = 1 yap.
# ============================================================
